name: Compliance Docs

on:
  push:
    branches: [main]
    paths: ['docs/compliance/*.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build DOCX files
        run: bash docs/compliance/build-docx.sh out

      - name: Create zip
        run: cd out && zip ../EasyRedact_Compliance.zip *.docx

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="compliance-docs"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Compliance-Dokumentation" \
              --notes "Auto-generated DOCX versions of the compliance documentation. Updated on every change to \`docs/compliance/\`."
          fi
          gh release upload "$TAG" EasyRedact_Compliance.zip --clobber
